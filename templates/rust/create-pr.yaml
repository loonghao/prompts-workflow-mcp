name: "create-pr"
description: "Create a pull request with automated checks for Rust projects"
version: "1.0.0"
scope: "global"
tags: ["rust", "pr", "ci"]

parameters:
  - name: "pr_title"
    description: "Title for the pull request"
    type: "string"
    required: false
    default: "feat: automated PR creation"
  - name: "pr_description"
    description: "Description for the pull request"
    type: "string"
    required: false
    default: "Automated PR created by prompts-workflow-mcp"

steps:
  - name: "Format code"
    type: "command"
    command: "cargo fmt"
    continue_on_error: true
    timeout: 60000

  - name: "Run clippy"
    type: "command"
    command: "cargo clippy -- -D warnings"
    continue_on_error: false
    timeout: 120000

  - name: "Run tests"
    type: "command"
    command: "cargo test"
    continue_on_error: false
    timeout: 300000

  - name: "Build release"
    type: "command"
    command: "cargo build --release"
    continue_on_error: true
    timeout: 300000

  - name: "Run benchmarks"
    type: "command"
    command: "cargo bench"
    continue_on_error: true
    timeout: 180000

  - name: "Create PR"
    type: "action"
    action: "github.create_pr"
    parameters:
      title: "{{ pr_title }}"
      description: "{{ pr_description }}"
      auto_clean_augment: true
    continue_on_error: false

environment:
  RUST_BACKTRACE: "1"
  CI: "true"

timeout: 900000

metadata:
  author: "prompts-workflow-mcp"
  category: "ci-cd"
  documentation: "https://github.com/yourusername/prompts-workflow-mcp#rust-workflows"
